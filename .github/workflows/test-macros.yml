name: Macro Tests

on:
  push:
    branches: [main]
    paths:
      - "tests/test_macros.py"
      - "tests/incollege_tests/macros.py"
      - "tests/macro_defs/**"
      - "requirements.txt"
      - ".github/workflows/test-macros.yml"
  pull_request:
    paths:
      - "tests/test_macros.py"
      - "tests/incollege_tests/macros.py"
      - "tests/macro_defs/**"
      - "requirements.txt"
      - ".github/workflows/test-macros.yml"
  workflow_dispatch:

jobs:
  test-macros:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run macro tests
        env:
          PYTHONPATH: tests
        run: python -m pytest tests/test_macros.py -v
