name: Deploy final presentation to GitHub Pages

# This workflow only uses safe context values (github.ref, needs.*.outputs,
# and steps.*.outputs from trusted actions). No user-controlled inputs are
# interpolated into run: commands.

on:
  push:
    branches:
      - main
      - feat/final_presentation
    paths:
      - 'final_presentation/site/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: final_presentation/site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        env:
          DECK_BASE: /in_college_program/
        run: bun run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: final_presentation/site/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
